<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
<title>Gold Fortune — TunBet</title>
<style>
  :root{ --gold:#FFC94D; --gold2:#FF8A00; --bg:#0a0612; --panel:rgba(255,255,255,0.05); }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%;background:radial-gradient(circle at 50% 0%, #1a1030 0%, #0a0612 60%, #050208 100%);color:#fff;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;overflow:hidden}
  #app{height:100dvh;display:flex;flex-direction:column;max-width:560px;margin:0 auto;position:relative}

  /* Header */
  header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;flex-shrink:0}
  .title{font-weight:900;font-size:15px;letter-spacing:1px;background:linear-gradient(180deg,#fff,var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 18px rgba(255,201,77,0.25)}
  .bal{display:flex;flex-direction:column;align-items:flex-end}
  .bal .lbl{font-size:8px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:1px}
  .bal .amt{font-weight:900;font-size:15px;color:var(--gold);font-variant-numeric:tabular-nums}

  /* Grid */
  .stage{flex:1;display:flex;align-items:center;justify-content:center;padding:6px 12px;min-height:0}
  .machine{width:100%;background:linear-gradient(180deg,rgba(255,201,77,0.10),rgba(0,0,0,0.25));border:2px solid rgba(255,201,77,0.35);border-radius:18px;padding:10px;box-shadow:0 10px 40px rgba(0,0,0,0.6),inset 0 0 30px rgba(255,138,0,0.08)}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
  .cell{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;font-size:min(7.5vw,38px);font-weight:900;border-radius:12px;background:radial-gradient(circle at 50% 35%,rgba(255,255,255,0.08),rgba(0,0,0,0.35));border:1px solid rgba(255,255,255,0.07);position:relative;overflow:hidden;transition:transform .08s}
  .sym{display:flex;align-items:center;justify-content:center;width:82%;height:82%;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.55))}
  .sym svg{width:100%;height:100%;display:block}
  .cell.spin{animation:blur .12s linear infinite}
  .cell.win{animation:pop .5s ease;border-color:var(--gold);box-shadow:0 0 18px rgba(255,201,77,0.6),inset 0 0 14px rgba(255,201,77,0.3);background:radial-gradient(circle at 50% 35%,rgba(255,201,77,0.25),rgba(255,138,0,0.1))}
  @keyframes blur{0%{filter:blur(0);opacity:1}50%{filter:blur(2px);opacity:.7}100%{filter:blur(0);opacity:1}}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}

  /* Win banner */
  .winbanner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.5);opacity:0;pointer-events:none;z-index:30;text-align:center;transition:all .35s cubic-bezier(.2,1.4,.4,1)}
  .winbanner.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
  .winbanner .big{font-size:13px;font-weight:900;letter-spacing:3px;color:#fff;text-transform:uppercase}
  .winbanner .amt{font-size:42px;font-weight:900;background:linear-gradient(180deg,#fff,var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 30px rgba(255,201,77,0.7);font-variant-numeric:tabular-nums}

  /* Controls */
  .controls{flex-shrink:0;padding:10px 14px calc(env(safe-area-inset-bottom,0px) + 14px);background:linear-gradient(180deg,transparent,rgba(0,0,0,0.4))}
  .row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .stakebox{flex:1;background:var(--panel);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:6px 10px;display:flex;align-items:center;justify-content:space-between}
  .stakebox .lbl{font-size:8px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:1px}
  .stakebox .val{font-size:18px;font-weight:900;color:#fff;font-variant-numeric:tabular-nums}
  .stepbtn{width:38px;height:38px;border-radius:11px;border:1px solid rgba(255,255,255,0.12);background:var(--panel);color:#fff;font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:transform .08s}
  .stepbtn:active{transform:scale(0.9)}
  .chips{display:flex;gap:6px;margin-bottom:10px}
  .chip{flex:1;padding:7px 0;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:var(--panel);color:rgba(255,255,255,0.7);font-size:12px;font-weight:800;text-align:center;cursor:pointer}
  .chip.active{background:rgba(255,201,77,0.18);border-color:var(--gold);color:var(--gold)}
  .spinbtn{width:100%;padding:16px;border:none;border-radius:16px;font-size:17px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#3a2400;background:linear-gradient(180deg,var(--gold),var(--gold2));box-shadow:0 6px 24px rgba(255,138,0,0.45);cursor:pointer;transition:transform .1s;display:flex;align-items:center;justify-content:center;gap:8px}
  .spinbtn:active{transform:scale(0.97)}
  .spinbtn:disabled{opacity:.55;cursor:not-allowed}
  .winline{text-align:center;font-size:12px;font-weight:800;color:var(--gold);height:18px;margin-bottom:6px;transition:opacity .3s}
  .msg{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:rgba(255,45,85,0.92);color:#fff;padding:9px 18px;border-radius:12px;font-size:13px;font-weight:700;z-index:50;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
  .msg.show{opacity:1}
  .spinner{width:16px;height:16px;border:2.5px solid rgba(58,36,0,0.3);border-top-color:#3a2400;border-radius:50%;animation:rot .7s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
  .coin{position:fixed;top:-30px;font-size:22px;z-index:40;pointer-events:none;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(110dvh) rotate(540deg);opacity:0}}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="title">⚜ GOLD FORTUNE</div>
    <div class="bal"><span class="lbl">Balance</span><span class="amt" id="balance">— TND</span></div>
  </header>

  <div class="stage">
    <div class="machine">
      <div class="grid" id="grid"></div>
    </div>
    <div class="winbanner" id="winbanner">
      <div class="big">BIG WIN</div>
      <div class="amt" id="winamt">+0.00</div>
    </div>
  </div>

  <div class="controls">
    <div class="winline" id="winline"></div>
    <div class="chips" id="chips"></div>
    <div class="row">
      <div class="stepbtn" id="dec">−</div>
      <div class="stakebox"><span class="lbl">Bet (TND)</span><span class="val" id="stake">1.00</span></div>
      <div class="stepbtn" id="inc">+</div>
    </div>
    <button class="spinbtn" id="spin"><span id="spinlabel">SPIN</span></button>
  </div>
</div>

<div class="msg" id="msg"></div>

<script>
(function(){
  // ── Config from URL: ?api=...&uid=...&alias=...&cur=TND ──
  var qs = new URLSearchParams(location.search);
  var API = (qs.get('api') || 'https://tunbet-sportsbook.onrender.com').replace(/\/$/,'');
  var UID = qs.get('uid') || '';
  var ALIAS = qs.get('alias') || 'tunbet/gold-fortune';
  var CUR = qs.get('cur') || 'TND';

  // ── Rich SVG icons — drawn as vectors, look crisp & premium on every device ──
  var SVG = {
    GEM: '<svg viewBox="0 0 64 64"><defs><linearGradient id="gem" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#9bf6e0"/><stop offset="1" stop-color="#10b07a"/></linearGradient></defs>'+
      '<polygon points="32,4 56,22 32,60 8,22" fill="url(#gem)" stroke="#0a7d56" stroke-width="1.5"/>'+
      '<polygon points="32,4 44,22 32,32 20,22" fill="#c7fff0" opacity=".9"/>'+
      '<polygon points="8,22 20,22 32,60" fill="#0e9d6e"/>'+
      '<polygon points="56,22 44,22 32,60" fill="#0a8a5e"/>'+
      '<polygon points="20,22 44,22 32,32" fill="#5ee3b8"/>'+
      '<polygon points="32,4 56,22 44,22" fill="#7df0cf"/>'+
      '<polygon points="32,4 8,22 20,22" fill="#a8ffe6"/></svg>',
    SEVEN: '<svg viewBox="0 0 64 64"><defs><linearGradient id="sv" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ff7a5a"/><stop offset="1" stop-color="#c81818"/></linearGradient></defs>'+
      '<text x="32" y="50" font-family="Arial Black,Arial" font-size="56" font-weight="900" text-anchor="middle" fill="url(#sv)" stroke="#7a0a0a" stroke-width="1.5">7</text>'+
      '<text x="30" y="48" font-family="Arial Black,Arial" font-size="56" font-weight="900" text-anchor="middle" fill="none" stroke="#ffd0c0" stroke-width="1" opacity=".5">7</text></svg>',
    CROWN: '<svg viewBox="0 0 64 64"><defs><linearGradient id="cr" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffe98a"/><stop offset="1" stop-color="#e8a200"/></linearGradient></defs>'+
      '<path d="M10 48 L8 20 L22 32 L32 12 L42 32 L56 20 L54 48 Z" fill="url(#cr)" stroke="#9a6b00" stroke-width="1.5" stroke-linejoin="round"/>'+
      '<rect x="10" y="48" width="44" height="8" rx="2" fill="#d99500" stroke="#9a6b00" stroke-width="1"/>'+
      '<circle cx="8" cy="20" r="4" fill="#ff5a7a"/><circle cx="56" cy="20" r="4" fill="#ff5a7a"/><circle cx="32" cy="12" r="4" fill="#7ad7ff"/>'+
      '<circle cx="22" cy="50" r="2.4" fill="#fff" opacity=".7"/><circle cx="42" cy="50" r="2.4" fill="#fff" opacity=".7"/></svg>',
    BELL: '<svg viewBox="0 0 64 64"><defs><linearGradient id="bl" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffe07a"/><stop offset="1" stop-color="#d98a00"/></linearGradient></defs>'+
      '<path d="M32 8 a6 6 0 0 1 6 6 c10 4 12 16 12 26 l4 6 H10 l4-6 c0-10 2-22 12-26 a6 6 0 0 1 6-6 Z" fill="url(#bl)" stroke="#9a6b00" stroke-width="1.5" stroke-linejoin="round"/>'+
      '<ellipse cx="26" cy="26" rx="4" ry="10" fill="#fff" opacity=".45"/>'+
      '<circle cx="32" cy="56" r="5" fill="#b87400" stroke="#9a6b00" stroke-width="1"/></svg>',
    CHERRY: '<svg viewBox="0 0 64 64"><path d="M30 12 C40 14 50 10 52 18" fill="none" stroke="#1f9d3a" stroke-width="3" stroke-linecap="round"/>'+
      '<path d="M30 12 C26 24 22 32 20 40" fill="none" stroke="#7a4a1a" stroke-width="3" stroke-linecap="round"/>'+
      '<path d="M52 18 C54 30 52 40 48 44" fill="none" stroke="#7a4a1a" stroke-width="3" stroke-linecap="round"/>'+
      '<path d="M30 12 q14 -8 18 4 q-10 -2 -18 -4Z" fill="#27c24a"/>'+
      '<circle cx="20" cy="46" r="12" fill="#e01e3c"/><circle cx="46" cy="48" r="12" fill="#c11030"/>'+
      '<circle cx="16" cy="42" r="3.5" fill="#fff" opacity=".6"/><circle cx="42" cy="44" r="3.5" fill="#fff" opacity=".5"/></svg>',
    STAR: '<svg viewBox="0 0 64 64"><defs><linearGradient id="st" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#9be0ff"/><stop offset="1" stop-color="#1577c8"/></linearGradient></defs>'+
      '<polygon points="32,4 40,24 62,24 44,38 51,60 32,46 13,60 20,38 2,24 24,24" fill="url(#st)" stroke="#0d4f8a" stroke-width="1.5" stroke-linejoin="round"/>'+
      '<polygon points="32,12 36,25 32,30 28,25" fill="#e6f6ff" opacity=".8"/></svg>',
    WILD: '<svg viewBox="0 0 64 64"><defs><linearGradient id="wd" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fff1a8"/><stop offset="1" stop-color="#ff8a00"/></linearGradient></defs>'+
      '<rect x="6" y="6" width="52" height="52" rx="12" fill="url(#wd)" stroke="#a85a00" stroke-width="2"/>'+
      '<rect x="11" y="11" width="42" height="42" rx="8" fill="none" stroke="#fff" stroke-width="1.5" opacity=".5"/>'+
      '<text x="32" y="42" font-family="Arial Black,Arial" font-size="18" font-weight="900" text-anchor="middle" fill="#7a3a00" letter-spacing="0.5">WILD</text></svg>',
    SCAT: '<svg viewBox="0 0 64 64"><defs><radialGradient id="sc" cx="50%" cy="40%" r="60%"><stop offset="0" stop-color="#e8c9ff"/><stop offset="1" stop-color="#7a2fd0"/></radialGradient></defs>'+
      '<circle cx="32" cy="32" r="26" fill="url(#sc)" stroke="#4a1a8a" stroke-width="2"/>'+
      '<polygon points="32,14 37,28 52,28 40,38 45,54 32,44 19,54 24,38 12,28 27,28" fill="#fff" opacity=".95"/></svg>',
    BAR: '<svg viewBox="0 0 64 64"><defs><linearGradient id="br" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#9aa0a8"/></linearGradient></defs>'+
      '<rect x="8" y="22" width="48" height="20" rx="5" fill="url(#br)" stroke="#5a5f66" stroke-width="2"/>'+
      '<text x="32" y="37" font-family="Arial Black,Arial" font-size="15" font-weight="900" text-anchor="middle" fill="#2a2f36" letter-spacing="1">BAR</text></svg>',
  };
  // Map internal key → svg
  var SYMS = { CHERRY:SVG.CHERRY, BELL:SVG.BELL, STAR:SVG.STAR, GEM:SVG.GEM, SEVEN:SVG.SEVEN, BAR:SVG.BAR, CROWN:SVG.CROWN, WILD:SVG.WILD, SCAT:SVG.SCAT };
  var POOL = ['CHERRY','BELL','STAR','GEM','SEVEN','BAR','CROWN','WILD'];
  var ROWS = 3, COLS = 5;
  var STAKES = [0.5, 1, 2, 5, 10, 25, 50];
  var stake = 1.00, balance = 0, spinning = false;

  var grid = document.getElementById('grid');
  var cells = [];
  for (var r=0;r<ROWS;r++) for (var c=0;c<COLS;c++){
    var d = document.createElement('div'); d.className='cell';
    var s = document.createElement('div'); s.className='sym';
    d.appendChild(s);
    grid.appendChild(d); cells.push(d);
    setCell(r*COLS+c, POOL[(r*COLS+c)%POOL.length]);
  }

  function rndSym(){ return POOL[Math.floor(Math.random()*POOL.length)]; }
  function setCell(i,key){
    var svg = SYMS[key] || SYMS['CHERRY'];
    cells[i].querySelector('.sym').innerHTML = svg;
    cells[i].dataset.key = key;
  }

  var balEl=document.getElementById('balance'), stakeEl=document.getElementById('stake');
  function fmt(n){ return Number(n).toFixed(2); }
  function renderBal(){ balEl.textContent = fmt(balance)+' '+CUR; }
  function renderStake(){ stakeEl.textContent = fmt(stake); document.querySelectorAll('.chip').forEach(function(ch){ ch.classList.toggle('active', Number(ch.dataset.v)===stake); }); }

  // chips
  var chipsEl=document.getElementById('chips');
  STAKES.forEach(function(v){ var b=document.createElement('div'); b.className='chip'; b.dataset.v=v; b.textContent=v; b.onclick=function(){ stake=v; renderStake(); }; chipsEl.appendChild(b); });

  document.getElementById('inc').onclick=function(){ var i=STAKES.indexOf(stake); stake = STAKES[Math.min(STAKES.length-1, (i<0?1:i)+1)]; renderStake(); };
  document.getElementById('dec').onclick=function(){ var i=STAKES.indexOf(stake); stake = STAKES[Math.max(0,(i<0?1:i)-1)]; renderStake(); };

  function toast(t){ var m=document.getElementById('msg'); m.textContent=t; m.classList.add('show'); setTimeout(function(){m.classList.remove('show');},2200); }

  function coins(n){ for(var i=0;i<n;i++){ (function(){ var c=document.createElement('div'); c.className='coin'; c.textContent=['🪙','💰','💎'][i%3]; c.style.left=(5+Math.random()*90)+'%'; c.style.animationDuration=(1.1+Math.random()*0.9)+'s'; document.body.appendChild(c); setTimeout(function(){c.remove();},2200); })(); } }

  // ── Load balance ──
  function loadBalance(){
    if(!UID){ balance=0; renderBal(); return; }
    fetch(API+'/api/wallet/balance',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:'tb_'+UID})})
      .then(function(r){return r.json();}).then(function(d){ if(d&&typeof d.balance!=='undefined'){ balance=Number(d.balance); renderBal(); } }).catch(function(){});
  }

  // ── Spin ──
  var winbanner=document.getElementById('winbanner'), winamtEl=document.getElementById('winamt'), winlineEl=document.getElementById('winline');
  var spinBtn=document.getElementById('spin'), spinLabel=document.getElementById('spinlabel');

  function startSpinAnim(){
    cells.forEach(function(c){ c.classList.add('spin'); c.classList.remove('win'); });
    winbanner.classList.remove('show'); winlineEl.textContent='';
  }
  var rollTimer=null;
  function rollLoop(){ rollTimer=setInterval(function(){ for(var i=0;i<cells.length;i++) setCell(i, rndSym()); }, 70); }
  function stopRoll(){ clearInterval(rollTimer); cells.forEach(function(c){ c.classList.remove('spin'); }); }

  function showReels(reels){
    // reels = 3 rows x 5 cols from backend (emoji/text) → map to our symbol keys
    var map={ '🍒':'CHERRY','🍋':'CROWN','🔔':'BELL','⭐':'STAR','💎':'GEM','7':'SEVEN','BAR':'BAR','WILD':'WILD','SCAT':'SCAT' };
    for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++){
      var raw = (reels && reels[r] && reels[r][c]) ? reels[r][c] : null;
      var key = raw ? (map[raw] || 'CHERRY') : rndSym();
      setCell(r*COLS+c, key);
    }
  }

  function highlightWins(wins){
    if(!wins) return;
    var lineRows={ 'Top':[0,0,0,0,0],'Middle':[1,1,1,1,1],'Bottom':[2,2,2,2,2],'V':[0,1,2,1,0],'Λ':[2,1,0,1,2] };
    wins.forEach(function(w){
      var rows=lineRows[w.line];
      if(rows){ for(var c=0;c<COLS;c++){ var i=rows[c]*COLS+c; if(i<cells.length) cells[i].classList.add('win'); } }
      else { cells.forEach(function(c){ if(c.dataset.key==='SCAT'||c.dataset.key==='STAR'||c.dataset.key==='GEM') c.classList.add('win'); }); }
    });
  }

  function doSpin(){
    if(spinning) return;
    if(!UID){ toast('سجّل الدخول أولاً'); return; }
    if(stake>balance){ toast('رصيد غير كافٍ'); return; }
    spinning=true; spinBtn.disabled=true; spinLabel.innerHTML='<span class="spinner"></span>';
    startSpinAnim(); rollLoop();

    fetch(API+'/api/slotopol/spin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:Number(UID),alias:ALIAS,stake:stake})})
      .then(function(r){return r.json();})
      .then(function(d){
        setTimeout(function(){
          stopRoll();
          if(!d || d.success===false){ toast(d&&d.error?d.error:'خطأ، حاول مجدداً'); if(d&&typeof d.balance!=='undefined'){balance=Number(d.balance);renderBal();} finishSpin(); return; }
          showReels(d.reels);
          balance = Number(d.balance); renderBal();
          if(d.win>0){
            highlightWins(d.wins);
            winamtEl.textContent='+'+fmt(d.win)+' '+CUR;
            winbanner.querySelector('.big').textContent = d.win>=stake*20?'MEGA WIN':d.win>=stake*8?'BIG WIN':'WIN';
            winbanner.classList.add('show');
            winlineEl.textContent='🎉 ربحت '+fmt(d.win)+' '+CUR;
            coins(d.win>=stake*10?22:10);
            setTimeout(function(){ winbanner.classList.remove('show'); },2200);
          } else {
            winlineEl.textContent='حظ أوفر المرة القادمة';
          }
          finishSpin();
        }, 650);
      })
      .catch(function(){ stopRoll(); toast('تعذّر الاتصال بالخادم'); finishSpin(); });
  }
  function finishSpin(){ spinning=false; spinBtn.disabled=false; spinLabel.textContent='SPIN'; }

  spinBtn.onclick=doSpin;

  renderStake(); renderBal(); loadBalance();
  // refresh balance when window regains focus
  window.addEventListener('focus', loadBalance);
})();
</script>
</body>
</html>
